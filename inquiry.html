<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry | Bhatiya Photography</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="inquiry-page">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Bhatiya Photography</a>
      </div>
    </nav>

    <section class="inquiry-hero d-flex align-items-center">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-lg border-0 p-4 p-md-5">
              <p class="text-uppercase small text-secondary">Inquiry Form</p>
              <h1 class="fw-bold mb-3">Tell us about your dream shoot.</h1>
              <p class="text-muted mb-4">Share a few details and we will get back to you with availability and pricing.</p>
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <input type="text" class="form-control" placeholder="Full name" />
                  </div>
                  <div class="col-md-6">
                    <input type="email" class="form-control" placeholder="Email address" />
                  </div>
                  <div class="col-md-6">
                    <input type="tel" class="form-control" placeholder="Phone number" />
                  </div>
                  <div class="col-md-6">
                    <select class="form-select">
                      <option selected>Service type</option>
                      <option>Wedding</option>
                      <option>Portrait</option>
                      <option>Event</option>
                      <option>Commercial</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <input type="text" class="form-control" placeholder="Preferred date" />
                  </div>
                  <div class="col-12">
                    <textarea class="form-control" rows="5" placeholder="Tell us more about your vision..."></textarea>
                  </div>
                  <div class="col-12">
                    <button class="btn btn-dark w-100">Submit Inquiry</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
